name: New Lead

on:
  repository_dispatch:
    types: [new-lead]

jobs:
  save-lead:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install googleapis axios
      - name: Save lead to Sheets and Telegram
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          LEAD_NAME: ${{ github.event.client_payload.name }}
          LEAD_PHONE: ${{ github.event.client_payload.phone }}
          LEAD_TG: ${{ github.event.client_payload.tg }}
        run: node .github/scripts/save-lead.js
